[flake8]
select = DOC101,DOC102,DOC103
style = numpy
skip_checking_private_functions = True
ignore_underscore_args = True
ignore_private_args = True
should_document_star_arguments = False
# The adaptive classes derive from protocolinterface.ProtocolInterface and register
# their constructor parameters at runtime via self._arg(...), documenting them in the
# class docstring. Their __init__ signature is just (self), so pydoclint reports the
# documented args as "more arguments than in function signature" (DOC102/DOC103). That
# is a false positive for this framework pattern, so silence those two codes here.
per-file-ignores =
    htmd/adaptive/*:DOC102,DOC103
